# .streamlit/secrets.toml
# ─────────────────────────────────────────────────────────────
# Copia questo file in .streamlit/secrets.toml e compila i valori.
# NON fare commit di questo file su Git (è già in .gitignore).
# Su Streamlit Cloud usa la sezione "Secrets" nelle impostazioni dell'app.
# ─────────────────────────────────────────────────────────────

[snowflake]
account   = "ORGNAME-ACCOUNTNAME"   # es. "xy12345.eu-west-1"
user      = "IL_TUO_USER"
password  = "LA_TUA_PASSWORD"
warehouse = "COMPUTE_WH"
database  = "RAG_DB"
schema    = "PUBLIC"
role      = "SYSADMIN"              # opzionale, lascia "" se non necessario
